# docker-compose.prod.yml — Production overrides
# Used on VPS: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --wait
#
# Activates:
#   • Traefik Let's Encrypt SSL (ACME via TLS challenge)
#   • Traefik labels on all app services (routes by domain/subdomain)
#   • Removes raw port exposures (Traefik handles ingress — no direct access)
#   • Restricts DB + Loki to internal network only
#
# Required env vars (in .env on the VPS):
#   DOMAIN        — primary domain, e.g. example.com
#   ACME_EMAIL    — email for Let's Encrypt expiry notices
#   GRAFANA_PASSWORD

services:
  traefik:
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      # Dashboard is off in production (access via SSH tunnel if needed)
      - "--api.dashboard=false"
    ports:
      - "80:80"
      - "443:443"
      # No 8080 in production — use: ssh -L 8080:localhost:8080 user@vps

  # ── App services: remove raw ports, add Traefik routing labels ────────────

  server:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.server.entrypoints=websecure"
      - "traefik.http.routers.server.tls.certresolver=letsencrypt"
      - "traefik.http.services.server.loadbalancer.server.port=3000"

  assistant:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.assistant.rule=Host(`assistant.${DOMAIN}`)"
      - "traefik.http.routers.assistant.entrypoints=websecure"
      - "traefik.http.routers.assistant.tls.certresolver=letsencrypt"
      - "traefik.http.services.assistant.loadbalancer.server.port=3001"

  notifications:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notifications.rule=Host(`notifications.${DOMAIN}`)"
      - "traefik.http.routers.notifications.entrypoints=websecure"
      - "traefik.http.routers.notifications.tls.certresolver=letsencrypt"
      - "traefik.http.services.notifications.loadbalancer.server.port=3002"

  web:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  # ── Lock down DB and Loki — internal only ─────────────────────────────────

  db:
    ports: !reset []   # never expose Postgres externally

  loki:
    ports: !reset []   # never expose Loki externally

  # ── smtp4dev: UI port closed in prod; SMTP stays on internal network ──────
  # Override SMTP_HOST in your VPS .env to use a real relay (SES, Postmark…)
  smtp-server:
    ports: !reset []   # web UI not needed in prod

  # ── Grafana behind Traefik with auth ─────────────────────────────────────
  grafana:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
