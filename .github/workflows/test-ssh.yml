name: Test SSH Connection

on:
  workflow_dispatch:

jobs:
  test-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Show runner IP
        run: curl -s https://api.ipify.org && echo

      - name: Check secret presence
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST_KEY: ${{ secrets.SSH_HOST_KEY }}
        run: |
          echo "SSH_HOST set:            $([[ -n "$SSH_HOST" ]] && echo YES || echo NO)"
          echo "SSH_USER set:            $([[ -n "$SSH_USER" ]] && echo YES || echo NO)"
          echo "SSH_PRIVATE_KEY set:     $([[ -n "$SSH_PRIVATE_KEY" ]] && echo YES || echo NO)"
          echo "SSH_PRIVATE_KEY_B64 len: ${#SSH_PRIVATE_KEY_B64}"
          echo "SSH_HOST_KEY set:        $([[ -n "$SSH_HOST_KEY" ]] && echo YES || echo NO)"

      - name: Write & validate SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key && echo "Key is valid"
          head -1 ~/.ssh/deploy_key

      - name: TCP reachability test (port 443)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          echo "Testing TCP $SSH_HOST:443 ..."
          timeout 10 bash -c "echo > /dev/tcp/$SSH_HOST/443" && echo "TCP OK" || echo "TCP FAILED (firewall/network block)"

      - name: SSH connect via port 443 with host key (dokku/github-action style)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_HOST_KEY: ${{ secrets.SSH_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_HOST_KEY" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -v \
            -p 443 \
            "dokku@${SSH_HOST}" \
            "echo SSH_OK && dokku version" 2>&1 | tail -40

      - name: SSH connect for migrations (base64 key, port 443)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_HOST_KEY: ${{ secrets.SSH_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/deploy_key_b64
          chmod 600 ~/.ssh/deploy_key_b64
          echo "$SSH_HOST_KEY" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key_b64 \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -p 443 \
            "${SSH_USER:-root}@${SSH_HOST}" \
            "echo MIGRATIONS_SSH_OK && whoami"
