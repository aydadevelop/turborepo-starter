name: Deploy (Docker)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-docker-${{ github.ref }}-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  DEFAULT_DEPLOY_PATH: /srv/app

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: server
            dockerfile: Dockerfile
          - app: assistant
            dockerfile: Dockerfile
          - app: notifications
            dockerfile: Dockerfile
          - app: web
            dockerfile: Dockerfile.web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            APP=${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          install -m 700 -d /tmp/codex-deploy
          cat > /tmp/codex-deploy/deploy_key <<'EOF'
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 /tmp/codex-deploy/deploy_key

      - name: Sync deploy config to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          SSH_KEY_PATH: /tmp/codex-deploy/deploy_key
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || env.DEFAULT_DEPLOY_PATH }}
        run: |
          bash infra/scripts/sync-vps-config.sh \
            --env "${{ github.event.inputs.environment || 'production' }}" \
            --deploy-path "${{ secrets.DEPLOY_PATH || env.DEFAULT_DEPLOY_PATH }}"

      - name: Write runtime .env to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          SSH_KEY_PATH: /tmp/codex-deploy/deploy_key
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || env.DEFAULT_DEPLOY_PATH }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DOMAIN: ${{ vars.DOMAIN }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_FROM: ${{ vars.SMTP_FROM }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
          LOKI_URL: ${{ vars.LOKI_URL }}
          GRAFANA_PORT: ${{ vars.GRAFANA_PORT }}
          GRAFANA_ALERT_EMAIL: ${{ vars.GRAFANA_ALERT_EMAIL }}
          NODE_ENV:            ${{ vars.NODE_ENV }}
          IMAGE_PREFIX: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          GIT_SHA: ${{ github.sha }}
        run: |
          bash infra/scripts/write-vps-env.sh \
            --env "${{ github.event.inputs.environment || 'production' }}" \
            --deploy-path "${{ secrets.DEPLOY_PATH || env.DEFAULT_DEPLOY_PATH }}"

      - name: Deploy on VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          SSH_KEY_PATH: /tmp/codex-deploy/deploy_key
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || env.DEFAULT_DEPLOY_PATH }}
          GHCR_USER: ${{ secrets.GHCR_USER || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          bash infra/scripts/deploy-vps.sh \
            --env "${{ github.event.inputs.environment || 'production' }}" \
            --deploy-path "${{ secrets.DEPLOY_PATH || env.DEFAULT_DEPLOY_PATH }}" \
            --ghcr-user "${GHCR_USER}"

      - name: Audit deploy target
        if: always()
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          SSH_KEY_PATH: /tmp/codex-deploy/deploy_key
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || env.DEFAULT_DEPLOY_PATH }}
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          bash infra/scripts/audit-vps.sh \
            --env "${{ github.event.inputs.environment || 'production' }}" \
            --deploy-path "${{ secrets.DEPLOY_PATH || env.DEFAULT_DEPLOY_PATH }}" \
            --domain "${{ vars.DOMAIN }}"
