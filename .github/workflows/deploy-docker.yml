name: Deploy (Dokku)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "staging"
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "staging"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}-${{ inputs.environment || github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Build & push per-app Docker images to GHCR ────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: server
            dockerfile: Dockerfile
          - app: assistant
            dockerfile: Dockerfile
          - app: notifications
            dockerfile: Dockerfile
          - app: web
            dockerfile: Dockerfile.web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            APP=${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # ── Deploy images to Dokku on VPS ──────────────────────────────────────────
  deploy:
    name: Deploy to Dokku
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    environment:
      name: ${{ inputs.environment || github.event.inputs.environment || 'staging' }}
    env:
      # SSH_HOST, SSH_USER, SSH_PORT are set by `pulumi up` → sync-ci-secrets
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Run DB migrations
        run: |
          ssh -o StrictHostKeyChecking=no -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "dokku run server node dist/index.mjs db:migrate" || echo "Migration skipped (first deploy?)"

      - name: Deploy apps to Dokku
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          GIT_SHA: ${{ github.sha }}
        run: bash infra/scripts/deploy-dokku.sh
