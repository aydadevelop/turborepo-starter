name: Deploy (Dokku)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "staging"
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "staging"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}-${{ inputs.environment || github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Build & push per-app Docker images to GHCR ────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: server
            dockerfile: Dockerfile
          - app: assistant
            dockerfile: Dockerfile
          - app: notifications
            dockerfile: Dockerfile
          - app: web
            dockerfile: Dockerfile.web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            APP=${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # ── Deploy images to Dokku on VPS ──────────────────────────────────────────
  deploy:
    name: Deploy to Dokku
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    environment:
      name: ${{ inputs.environment || github.event.inputs.environment || 'staging' }}
    env:
      # SSH_HOST, SSH_USER, SSH_PORT, SSH_PRIVATE_KEY_B64 set by `pulumi up` → sync-ci-secrets
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Validate VPS connectivity
        run: |
          echo "Runner IP: $(curl -sf https://ifconfig.me || echo unknown)"
          echo "Testing TCP to ${SSH_HOST}:${SSH_PORT} ..."
          timeout 10 bash -c "echo >/dev/tcp/${SSH_HOST}/${SSH_PORT}" \
            && echo "TCP: OPEN" \
            || echo "TCP: BLOCKED/TIMEOUT"

      - name: Run DB migrations
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "dokku run server node dist/index.mjs db:migrate" || echo "Migration skipped (first deploy?)"

      - name: Deploy apps to Dokku
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          GIT_SHA: ${{ github.sha }}
          SSH_KEY_FILE: ~/.ssh/deploy_key
        run: bash infra/scripts/deploy-dokku.sh
