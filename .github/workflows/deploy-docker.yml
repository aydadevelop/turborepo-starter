name: Deploy (Dokku)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "staging"
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "staging"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}-${{ inputs.environment || github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Build & push per-app Docker images to GHCR ────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: server
            dockerfile: Dockerfile
          - app: assistant
            dockerfile: Dockerfile
          - app: notifications
            dockerfile: Dockerfile
          - app: web
            dockerfile: Dockerfile.web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            APP=${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # ── Deploy images to Dokku on VPS ──────────────────────────────────────────
  deploy:
    name: Deploy to Dokku
    runs-on: [self-hosted, vps]
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: ${{ inputs.environment || github.event.inputs.environment || 'staging' }}
    strategy:
      max-parallel: 2
      matrix:
        app: [server, assistant, notifications, web]
    steps:
      - name: Deploy ${{ matrix.app }} to Dokku
        run: |
          if out=$(sudo dokku git:from-image ${{ matrix.app }} ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:sha-${{ github.sha }} 2>&1); then
            echo "$out"
          else
            code=$?
            echo "$out"
            if echo "$out" | grep -q "No changes detected"; then
              echo "Already up to date, skipping."
            else
              exit $code
            fi
          fi

  # ── Run DB migrations after deploy ─────────────────────────────────────────
  migrate:
    name: Run DB migrations
    runs-on: [self-hosted, vps]
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Run migrations
        run: sudo dokku run server node dist/migrate.mjs
