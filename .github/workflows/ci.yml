name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx turbo run build --affected
          else
            bun run build
          fi

      - name: Lint
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx turbo run lint --affected
          else
            bun run lint
          fi

      - name: Type check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx turbo run check-types --affected
          else
            bun run check-types
          fi

      - name: Test
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx turbo run test --affected
          else
            bun run test
          fi

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2E test
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx turbo run test:e2e --affected
          else
            bun run test:e2e
          fi
        env:
          PUBLIC_SERVER_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on push to main or PR events
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    environment:
      name: ${{ github.event_name == 'push' && 'production' || format('pr-{0}', github.event.number) }}
      url: ${{ steps.deploy.outputs.web_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Deploy to Cloudflare
        id: deploy
        run: |
          STAGE=${{ github.event_name == 'push' && 'prod' || format('pr-{0}', github.event.number) }}
          echo "Deploying stage: $STAGE"

          # Run deploy and capture output
          bun run deploy -- --stage $STAGE 2>&1 | tee deploy.log

          # Extract URLs from deploy output
          WEB_URL=$(grep -oP 'Web\s+->\s+\K(https?://[^\s]+)' deploy.log || echo "")
          SERVER_URL=$(grep -oP 'Server\s+->\s+\K(https?://[^\s]+)' deploy.log || echo "")

          echo "web_url=$WEB_URL" >> $GITHUB_OUTPUT
          echo "server_url=$SERVER_URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const webUrl = '${{ steps.deploy.outputs.web_url }}';
            const serverUrl = '${{ steps.deploy.outputs.server_url }}';

            const body = `## 🚀 Preview Deployment

            | App | URL |
            |-----|-----|
            | Web | ${webUrl || 'N/A'} |
            | Server | ${serverUrl || 'N/A'} |

            *Deployed from commit ${context.sha.substring(0, 7)}*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## 🚀 Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Destroy preview environment
        run: |
          STAGE=pr-${{ github.event.number }}
          echo "Destroying stage: $STAGE"
          bun run destroy -- --stage $STAGE
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
