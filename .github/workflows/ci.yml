name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_LOG_ORDER: grouped

jobs:
  # ── Plan: determine which apps are affected ─────────────────────────────────
  plan:
    name: Plan deploy
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.affected.outputs.matrix }}
      has_apps: ${{ steps.affected.outputs.has_apps }}
      run_migrations: ${{ steps.affected.outputs.run_migrations }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect affected apps
        id: affected
        run: |
          declare -A DOCKERFILES=(
            [server]=Dockerfile
            [assistant]=Dockerfile
            [notifications]=Dockerfile
            [web]=Dockerfile.web
          )
          DEPLOY_APPS=("server" "assistant" "notifications" "web")

          MATRIX_INCLUDES="[]"
          RUN_MIGRATIONS=false
          FALLBACK=false

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILT="...[origin/main]"
          else
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              FILT="...[${{ github.event.before }}]"
            else
              # Use origin/main as fallback for push to main if before sha is missing
              FILT="...[origin/main]"
            fi
          fi

          echo "Using turbo filter: $FILT"

          # Only capture stdout for JSON, errors to stderr
          if ! bunx turbo ls --filter="$FILT" --output=json > affected.json 2> turbo_err.log; then
            echo "::warning::turbo ls failed, falling back to full deploy"
            cat turbo_err.log
            FALLBACK=true
          fi

          if [ "$FALLBACK" = "true" ]; then
            for app in "${DEPLOY_APPS[@]}"; do
              echo "  → $app (fallback: deploying all)"
              MATRIX_INCLUDES=$(echo "$MATRIX_INCLUDES" | jq \
                --arg app "$app" \
                --arg dockerfile "${DOCKERFILES[$app]}" \
                '. + [{"app": $app, "dockerfile": $dockerfile}]')
            done
            RUN_MIGRATIONS=true
          else
            # Extract package names safely
            AFFECTED_NAMES=$(jq -r '.packages.items[].name // empty' affected.json)
            echo "Affected package names:"
            echo "$AFFECTED_NAMES"

            for app in "${DEPLOY_APPS[@]}"; do
              if echo "$AFFECTED_NAMES" | grep -qx "$app"; then
                echo "  → $app is affected"
                MATRIX_INCLUDES=$(echo "$MATRIX_INCLUDES" | jq \
                  --arg app "$app" \
                  --arg dockerfile "${DOCKERFILES[$app]}" \
                  '. + [{"app": $app, "dockerfile": $dockerfile}]')
              else
                echo "  → $app is NOT affected, skipping"
              fi
            done

            # Dependencies indicating migrations should run
            if echo "$AFFECTED_NAMES" | grep -qx "@my-app/db" || echo "$AFFECTED_NAMES" | grep -qx "server"; then
              RUN_MIGRATIONS=true
              echo "  → db/server is affected, migrations will run"
            fi
          fi

          MATRIX=$(echo "$MATRIX_INCLUDES" | jq -c '{include: .}')
          HAS_APPS=$(echo "$MATRIX_INCLUDES" | jq 'length > 0')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "has_apps=$HAS_APPS" >> "$GITHUB_OUTPUT"
          echo "run_migrations=$RUN_MIGRATIONS" >> "$GITHUB_OUTPUT"
          echo "Deploy matrix: $MATRIX"
          echo "Has apps to deploy: $HAS_APPS"
          echo "Run migrations: $RUN_MIGRATIONS"

  # ── Job A: Build, Lint, Type Check, Unit Tests ────────────────────────────
  build:
    name: Build & Test
    needs: [plan]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.event.pull_request.base.sha || github.sha }}-
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build, Lint, Type Check & Test
        run: bunx turbo run build lint check-types test ${{ github.event_name == 'pull_request' && '--affected' || '' }}

  # ── Job B: E2E Tests (runs in parallel with build) ─────────────────────────
  e2e:
    name: E2E Tests
    needs: [plan]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    if: (github.event_name != 'pull_request' || github.event.action != 'closed') && needs.plan.outputs.has_apps == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.event.pull_request.base.sha || github.sha }}-
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: E2E test (Docker deployment-like stack)
        env:
          E2E_EXTRA_COMPOSE_FILES: docker-compose.ci-cache.yml
        run: bun run test:e2e:docker

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            packages/e2e-web/playwright-report
            packages/e2e-web/test-results
          retention-days: 7

  # ── Deploy (only on push to main, after both jobs pass) ────────────────────
  deploy:
    name: Deploy
    needs: [build, e2e, plan]
    # Always require build and e2e to succeed (or skip). The condition verifies it's push to main, apps are affected
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.plan.outputs.has_apps == 'true' && needs.build.result == 'success' && (needs.e2e.result == 'success' || needs.e2e.result == 'skipped')
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/deploy-docker.yml
    with:
      environment: staging
      app_matrix: ${{ needs.plan.outputs.matrix }}
      run_migrations: ${{ needs.plan.outputs.run_migrations == 'true' }}
    secrets: inherit
