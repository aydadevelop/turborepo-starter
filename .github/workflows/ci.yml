name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run check

      - name: Type check
        run: npm run check-types

      - name: Test
        run: npm run test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on push to main or PR events
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    environment:
      name: ${{ github.event_name == 'push' && 'production' || format('pr-{0}', github.event.number) }}
      url: ${{ steps.deploy.outputs.web_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Deploy to Cloudflare
        id: deploy
        run: |
          STAGE=${{ github.event_name == 'push' && 'prod' || format('pr-{0}', github.event.number) }}
          echo "Deploying stage: $STAGE"

          # Run deploy and capture output
          npm run deploy -- --stage $STAGE 2>&1 | tee deploy.log

          # Extract URLs from deploy output
          WEB_URL=$(grep -oP 'Web\s+->\s+\K(https?://[^\s]+)' deploy.log || echo "")
          SERVER_URL=$(grep -oP 'Server\s+->\s+\K(https?://[^\s]+)' deploy.log || echo "")

          echo "web_url=$WEB_URL" >> $GITHUB_OUTPUT
          echo "server_url=$SERVER_URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const webUrl = '${{ steps.deploy.outputs.web_url }}';
            const serverUrl = '${{ steps.deploy.outputs.server_url }}';

            const body = `## 🚀 Preview Deployment

            | App | URL |
            |-----|-----|
            | Web | ${webUrl || 'N/A'} |
            | Server | ${serverUrl || 'N/A'} |

            *Deployed from commit ${context.sha.substring(0, 7)}*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## 🚀 Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Destroy preview environment
        run: |
          STAGE=pr-${{ github.event.number }}
          echo "Destroying stage: $STAGE"
          npm run destroy -- --stage $STAGE
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
