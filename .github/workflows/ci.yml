name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_LOG_ORDER: grouped

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build, Lint, Type Check & Test
        run: bunx turbo run build lint check-types test ${{ github.event_name == 'pull_request' && '--affected' || '' }}

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Push DB schema & seed
        run: |
          bun run db:push
          bun run db:seed -- --scenario baseline
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/myapp

      - name: E2E test
        run: bunx turbo run test:e2e --filter=@my-app/e2e-web ${{ github.event_name == 'pull_request' && '--affected' || '' }}
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/myapp
          BETTER_AUTH_SECRET: ci-e2e-secret
          BETTER_AUTH_URL: http://127.0.0.1:43100
          SERVER_URL: http://127.0.0.1:43100
          CORS_ORIGIN: http://127.0.0.1:43173
          OPEN_ROUTER_API_KEY: ci-e2e-placeholder
          AI_MODEL: openai/gpt-5-nano
          PUBLIC_SERVER_URL: http://127.0.0.1:43100
          PUBLIC_ASSISTANT_URL: http://127.0.0.1:43102
          PLAYWRIGHT_SKIP_SEED: "1"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/e2e-web/playwright-report
            packages/e2e-web/test-results
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    # Deploy to VPS only on push to main. PRs get no preview environment
    # (Docker/VPS doesn't support per-PR envs the way Cloudflare Workers do).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Trigger Docker deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-docker.yml',
              ref: 'main',
              inputs: { environment: 'production' },
            });
            core.info('deploy-docker.yml workflow dispatched');

