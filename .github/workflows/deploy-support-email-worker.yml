name: Deploy Support Email Worker

on:
  push:
    branches: [main]
    paths:
      - apps/support-email-worker/**
      - packages/support/**
      - .github/workflows/deploy-support-email-worker.yml
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "staging"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: support-email-worker-${{ github.ref }}-${{ inputs.environment || 'staging' }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'staging' }}
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SUPPORT_EMAIL_ALLOWED_RECIPIENTS: ${{ vars.SUPPORT_EMAIL_ALLOWED_RECIPIENTS }}
      SUPPORT_EMAIL_WORKER_NAME: ${{ vars.SUPPORT_EMAIL_WORKER_NAME }}
      SUPPORT_EMAIL_WEBHOOK_SECRET: ${{ secrets.SUPPORT_EMAIL_WEBHOOK_SECRET }}
      SUPPORT_EMAIL_WEBHOOK_URL: ${{ vars.SUPPORT_EMAIL_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate required worker deploy env
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$SUPPORT_EMAIL_WEBHOOK_SECRET"
          test -n "$SUPPORT_EMAIL_WEBHOOK_URL"

      - name: Upload worker secret
        working-directory: apps/support-email-worker
        run: |
          node -e 'process.stdout.write(JSON.stringify({ SUPPORT_EMAIL_WEBHOOK_SECRET: process.env.SUPPORT_EMAIL_WEBHOOK_SECRET }))' > .wrangler-secrets.json
          bunx wrangler secret bulk .wrangler-secrets.json --name "${SUPPORT_EMAIL_WORKER_NAME:-support-email-worker-${{ inputs.environment || 'staging' }}}"
          rm .wrangler-secrets.json

      - name: Deploy worker
        working-directory: apps/support-email-worker
        run: |
          bunx wrangler deploy \
            --name "${SUPPORT_EMAIL_WORKER_NAME:-support-email-worker-${{ inputs.environment || 'staging' }}}" \
            --keep-vars \
            --var "SUPPORT_EMAIL_WEBHOOK_URL:${SUPPORT_EMAIL_WEBHOOK_URL}" \
            --var "SUPPORT_EMAIL_ALLOWED_RECIPIENTS:${SUPPORT_EMAIL_ALLOWED_RECIPIENTS}"
