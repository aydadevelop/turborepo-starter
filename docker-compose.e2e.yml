# docker-compose.e2e.yml — deployment-like E2E overrides for local + CI.
#
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d --build --wait db smtp-server server assistant notifications web
#
# Goals:
# - Keep startup topology close to deploy (real Docker images/services)
# - Use stable Playwright-facing host ports (431xx)
# - Avoid requiring the Loki Docker logging plugin in CI/local
# - Avoid depending on repository-local `.env` content

services:
  db:
    restart: "no"

  seaweedfs:
    restart: "no"

  seaweedfs-init:
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: seaweedfs-access-key
      AWS_SECRET_ACCESS_KEY: seaweedfs-secret-key
      AWS_EC2_METADATA_DISABLED: "true"
      STORAGE_S3_BUCKET: listing-public-v1

  smtp-server:
    restart: "no"

  server:
    restart: "no"
    logging:
      driver: json-file
      options: {}
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      SEED_DEMO_DATA: "false"
      BETTER_AUTH_SECRET: e2e-local-secret-0123456789-abcdef
      BETTER_AUTH_URL: http://localhost:${PLAYWRIGHT_SERVER_PORT:-43100}
      SERVER_URL: http://localhost:${PLAYWRIGHT_SERVER_PORT:-43100}
      CORS_ORIGIN: http://localhost:${PLAYWRIGHT_WEB_PORT:-43173}
      POLAR_ACCESS_TOKEN: ""
      POLAR_SUCCESS_URL: ""
      POLAR_PRODUCT_ID: ""
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_BOT_USERNAME: ""
      TELEGRAM_BOT_API_BASE_URL: ""
      CLOUDPAYMENTS_PUBLIC_ID: ""
      CLOUDPAYMENTS_API_SECRET: ""
      SUPPORT_EMAIL_INTAKE_SECRET: e2e-support-email-secret
      SUPPORT_EMAIL_INTAKE_ORGANIZATION_ID: ""
      STORAGE_BACKEND: s3
      STORAGE_PUBLIC_BASE_URL: http://localhost:${PLAYWRIGHT_STORAGE_PORT:-4333}/listing-public-v1
      STORAGE_S3_ENDPOINT: http://seaweedfs:8333
      STORAGE_S3_REGION: us-east-1
      STORAGE_S3_BUCKET: listing-public-v1
      STORAGE_S3_ACCESS_KEY_ID: seaweedfs-access-key
      STORAGE_S3_SECRET_ACCESS_KEY: seaweedfs-secret-key
      STORAGE_S3_FORCE_PATH_STYLE: "1"
      STORAGE_SIGNED_URL_TTL_SECONDS: "900"

  assistant:
    restart: "no"
    logging:
      driver: json-file
      options: {}
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      SERVER_URL: http://server:3000
      CORS_ORIGIN: http://localhost:${PLAYWRIGHT_WEB_PORT:-43173}
      BETTER_AUTH_SECRET: e2e-local-secret-0123456789-abcdef
      BETTER_AUTH_URL: http://localhost:${PLAYWRIGHT_SERVER_PORT:-43100}
      OPEN_ROUTER_API_KEY: e2e-openrouter-placeholder
      AI_MODEL: openai/gpt-5-nano:nitro

  notifications:
    restart: "no"
    logging:
      driver: json-file
      options: {}
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      SERVER_URL: http://server:3000
      CORS_ORIGIN: http://localhost:${PLAYWRIGHT_WEB_PORT:-43173}
      BETTER_AUTH_SECRET: e2e-local-secret-0123456789-abcdef
      BETTER_AUTH_URL: http://localhost:${PLAYWRIGHT_SERVER_PORT:-43100}
      EMAIL_BACKEND: smtp
      EMAIL_FROM_ADDRESS: noreply@localhost
      EMAIL_FROM_NAME: My App
      EMAIL_REPLY_TO: ""
      SMTP_HOST: smtp-server
      SMTP_PORT: "25"
      SMTP_SECURE: "0"
      SMTP_IGNORE_TLS: "1"
      SMTP_USER: ""
      SMTP_PASS: ""

  web:
    restart: "no"
    logging:
      driver: json-file
      options: {}
    environment:
      PORT: 3000
      ORIGIN: http://localhost:${PLAYWRIGHT_WEB_PORT:-43173}
      INTERNAL_SERVER_URL: http://server:3000
      INTERNAL_ASSISTANT_URL: http://assistant:3001
      PUBLIC_SERVER_URL: http://localhost:${PLAYWRIGHT_SERVER_PORT:-43100}
      PUBLIC_ASSISTANT_URL: http://localhost:${PLAYWRIGHT_ASSISTANT_PORT:-43102}
