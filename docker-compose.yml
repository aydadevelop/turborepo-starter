# Docker Compose for local development and VPS deployment
# Usage:
#   docker compose up -d                          # start all services
#   docker compose --profile infra up -d          # db + seaweedfs + smtp only
#   docker compose --profile observability up -d  # infra + observability stack
#   docker compose --profile apps up -d           # all (infra + obs + apps)
#   docker compose up -d db                       # single service
#   docker compose logs -f                        # follow logs
#
# Profiles:
#   infra        — db, seaweedfs, smtp-server (always required)
#   observability — loki, grafana, alloy, tempo, prometheus, pyroscope, postgres-exporter
#   apps         — server, assistant, notifications, web
#
# ── Observability (Loki + Grafana) ───────────────────────────────────────────
# Install the Loki Docker log driver ONCE on your VPS before first deploy:
#   docker plugin install grafana/loki-docker-driver:3.0.0 --alias loki --grant-all-permissions
# Set LOKI_URL in your VPS .env (default works on the same host):
#   LOKI_URL=http://loki:3100/loki/api/v1/push
# ─────────────────────────────────────────────────────────────────────────────

# Reusable local log-driver fragment — avoids requiring the Loki Docker plugin
x-loki-logging: &loki-logging
  logging:
    driver: json-file
    options: {}

services:
  db:
    profiles: [infra, observability, apps]
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp
      # Enable pg_stat_statements for query-level latency metrics
      POSTGRES_INITDB_ARGS: ""
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  seaweedfs:
    profiles: [infra, observability, apps]
    image: chrislusf/seaweedfs:4.17
    restart: unless-stopped
    command: ["mini", "-dir=/data"]
    environment:
      AWS_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-seaweedfs-access-key}
      AWS_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-seaweedfs-secret-key}
    ports:
      - "${STORAGE_PORT:-8333}:8333"
      - "127.0.0.1:${SEAWEEDFS_MASTER_PORT:-9333}:9333"
      - "127.0.0.1:${SEAWEEDFS_ADMIN_PORT:-23646}:23646"
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9333/cluster/status >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  seaweedfs-init:
    profiles: [infra, observability, apps]
    image: amazon/aws-cli:2.34.8
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-seaweedfs-access-key}
      AWS_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-seaweedfs-secret-key}
      AWS_EC2_METADATA_DISABLED: "true"
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-listing-public-v1}
    entrypoint: []
    command:
      - /bin/sh
      - -c
      - |
        until aws --endpoint-url http://seaweedfs:8333 s3api list-buckets >/dev/null 2>&1; do
          sleep 2;
        done;
        aws --endpoint-url http://seaweedfs:8333 s3api head-bucket --bucket "$$STORAGE_S3_BUCKET" >/dev/null 2>&1 ||
        aws --endpoint-url http://seaweedfs:8333 s3api create-bucket --bucket "$$STORAGE_S3_BUCKET";
    depends_on:
      seaweedfs:
        condition: service_healthy

  server:
    profiles: [apps]
    <<: *loki-logging
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: server
    image: ${SERVER_IMAGE:-}
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:3000"
    env_file: .env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      SEED_ANCHOR_DATE: ${SEED_ANCHOR_DATE:-2026-03-15}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-http://localhost:8333/listing-public-v1}
      STORAGE_S3_ENDPOINT: http://seaweedfs:8333
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-listing-public-v1}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-seaweedfs-access-key}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-seaweedfs-secret-key}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE:-1}
      STORAGE_SIGNED_URL_TTL_SECONDS: ${STORAGE_SIGNED_URL_TTL_SECONDS:-900}
      # OpenTelemetry — traces to Tempo (override any via .env)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_always_on}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOG_LEVEL: ${OTEL_LOG_LEVEL:-warn}
    depends_on:
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  assistant:
    profiles: [apps]
    <<: *loki-logging
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: assistant
    image: ${ASSISTANT_IMAGE:-}
    restart: unless-stopped
    ports:
      - "${ASSISTANT_PORT:-3001}:3001"
    env_file: .env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      SERVER_URL: http://server:3000
      # OpenTelemetry — traces to Tempo (override any via .env)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_always_on}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOG_LEVEL: ${OTEL_LOG_LEVEL:-warn}
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  notifications:
    profiles: [apps]
    <<: *loki-logging
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: notifications
    image: ${NOTIFICATIONS_IMAGE:-}
    restart: unless-stopped
    ports:
      - "${NOTIFICATIONS_PORT:-3002}:3002"
    env_file: .env
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      SERVER_URL: http://server:3000 # internal Docker network — bypasses Traefik
      EMAIL_BACKEND: smtp
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@localhost}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-My App}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      SMTP_HOST: smtp-server
      SMTP_PORT: "25"
      SMTP_SECURE: ${SMTP_SECURE:-0}
      SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS:-1}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      # OpenTelemetry — traces to Tempo (override any via .env)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_always_on}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOG_LEVEL: ${OTEL_LOG_LEVEL:-warn}
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
      smtp-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "fetch('http://localhost:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    profiles: [apps]
    <<: *loki-logging
    build:
      context: .
      dockerfile: Dockerfile.web
    image: ${WEB_IMAGE:-}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3003}:3000"
    env_file: .env
    environment:
      PORT: 3000
      ORIGIN: ${WEB_ORIGIN:-http://localhost:3003}
      # SSR fetches stay on the internal Docker network — never leave the host:
      INTERNAL_SERVER_URL: http://server:3000
      INTERNAL_ASSISTANT_URL: http://assistant:3001
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Mail (dev only — captures all outgoing emails, never relays) ─────────
  smtp-server:
    profiles: [infra, observability, apps]
    image: rnwood/smtp4dev:v3
    restart: unless-stopped
    ports:
      - "127.0.0.1:5025:80" # web UI — view captured emails at http://localhost:5025
      - "127.0.0.1:${SMTP4DEV_SMTP_PORT:-2525}:25" # host-visible SMTP for provider integration tests
    environment:
      ServerOptions__Urls: "http://*:80"
      ServerOptions__TcpPort: "25"
      ServerOptions__HostName: smtp-server
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Observability ─────────────────────────────────────────────────────────
  loki:
    profiles: [observability, apps]
    image: grafana/loki:3.4.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    profiles: [observability, apps]
    image: grafana/grafana:12.4.1
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3110}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      # Log noise reduction: silence verbose internal schedulers at info level
      GF_LOG_FILTERS: "dashboard-service:warn,ngalert.sender.router:warn,tsdb.loki:warn"
      # Alerting
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      # Telegram contact point (set in .env)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # Grafana-specific Telegram alert groups
      GRAFANA_TELEGRAM_BOT_TOKEN: ${GRAFANA_TELEGRAM_BOT_TOKEN:-}
      GRAFANA_TELEGRAM_DEV_CHAT_ID: ${GRAFANA_TELEGRAM_DEV_CHAT_ID:-}
      GRAFANA_TELEGRAM_PROD_CHAT_ID: ${GRAFANA_TELEGRAM_PROD_CHAT_ID:-}
      GRAFANA_ALERT_EMAIL: ${GRAFANA_ALERT_EMAIL:-ops@localhost}
      # SMTP (uses smtp4dev in dev; override in prod .env for real relay)
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${SMTP_HOST:-smtp-server}:${SMTP_PORT:-25}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM:-grafana@smtp-server.local}
      GF_SMTP_FROM_NAME: "Grafana Alerts"
      GF_SMTP_SKIP_VERIFY: "true" # smtp4dev has no TLS; disable in prod if relay requires it
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy

  alloy:
    profiles: [observability, apps]
    image: grafana/alloy:latest
    restart: unless-stopped
    # Alloy UI available at http://localhost:12345 for live config/pipeline debug
    ports:
      - "127.0.0.1:12345:12345"
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    # eBPF profiling: privileged grants kernel probe access;
    # pid:host lets Alloy see all container processes via /proc.
    # On macOS Docker Desktop: pyroscope.ebpf starts in error state (kallsyms
    # restricted) but logs/metrics/cAdvisor continue working. See docs/dev.md.
    # On Linux VPS: run once on host: sysctl -w kernel.kptr_restrict=0 && sysctl -w kernel.perf_event_paranoid=-1
    privileged: true
    pid: host
    volumes:
      - ./infra/grafana/alloy.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro # cgroup → container ID resolution
      - /var/lib/docker:/var/lib/docker:ro # cAdvisor container layer metadata
    depends_on:
      loki:
        condition: service_healthy

  tempo:
    profiles: [observability, apps]
    image: grafana/tempo:2.7.2
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200" # Tempo HTTP / query frontend
      - "127.0.0.1:4317:4317" # OTLP gRPC receiver
      - "127.0.0.1:4318:4318" # OTLP HTTP receiver
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  prometheus:
    profiles: [observability, apps]
    image: prom/prometheus:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-remote-write-receiver
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pyroscope:
    profiles: [observability, apps]
    image: grafana/pyroscope:latest
    restart: unless-stopped
    command: ["--log.level=warn"]
    ports:
      - "127.0.0.1:4040:4040"
    volumes:
      - pyroscope_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4040/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Exports PostgreSQL metrics to Prometheus.
  # Enables query latency, connection pool, table bloat, and lock monitoring.
  # pg_stat_statements must be enabled in postgres (loaded below via POSTGRES_INITDB_ARGS).
  postgres-exporter:
    profiles: [observability, apps]
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@db:5432/myapp?sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  seaweedfs_data:
  loki_data:
  grafana_data:
  tempo_data:
  prometheus_data:
  pyroscope_data:

# ── Observability access ──────────────────────────────────────────────────────
# Grafana: http://<vps-ip>:3110  (admin / ${GRAFANA_PASSWORD:-change-me})
# Loki is bound to 127.0.0.1 only — not exposed externally.
# Logs flow automatically from app containers via the loki Docker log driver.
