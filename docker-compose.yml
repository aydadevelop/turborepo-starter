# Docker Compose for local development and VPS deployment
# Usage:
#   docker compose up -d        # start all services
#   docker compose up -d db     # start only Postgres
#   docker compose logs -f      # follow logs
#
# ── Observability (Loki + Grafana) ───────────────────────────────────────────
# Install the Loki Docker log driver ONCE on your VPS before first deploy:
#   docker plugin install grafana/loki-docker-driver:3.0.0 --alias loki --grant-all-permissions
# Set LOKI_URL in your VPS .env (default works on the same host):
#   LOKI_URL=http://loki:3100/loki/api/v1/push
# ─────────────────────────────────────────────────────────────────────────────

# Reusable log-driver fragment — YAML-merge into any app service with <<: *loki-logging
x-loki-logging: &loki-logging
  logging:
    driver: loki
    options:
      loki-url: "${LOKI_URL:-http://loki:3100/loki/api/v1/push}"
      loki-retries: "3"
      loki-batch-size: "400"

services:
  db:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:4.17
    restart: unless-stopped
    command: ["weed", "mini", "-dir=/data"]
    environment:
      AWS_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-seaweedfs-access-key}
      AWS_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-seaweedfs-secret-key}
    ports:
      - "${STORAGE_PORT:-8333}:8333"
      - "127.0.0.1:${SEAWEEDFS_MASTER_PORT:-9333}:9333"
      - "127.0.0.1:${SEAWEEDFS_ADMIN_PORT:-23646}:23646"
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9333/cluster/status >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  seaweedfs-init:
    image: amazon/aws-cli:2
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-seaweedfs-access-key}
      AWS_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-seaweedfs-secret-key}
      AWS_EC2_METADATA_DISABLED: "true"
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-listing-public-v1}
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      until aws --endpoint-url http://seaweedfs:8333 s3api list-buckets >/dev/null 2>&1; do
        sleep 2;
      done;
      aws --endpoint-url http://seaweedfs:8333 s3api head-bucket --bucket "$STORAGE_S3_BUCKET" >/dev/null 2>&1 ||
      aws --endpoint-url http://seaweedfs:8333 s3api create-bucket --bucket "$STORAGE_S3_BUCKET";
    depends_on:
      seaweedfs:
        condition: service_healthy

  server:
    <<: *loki-logging
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: server
    image: ${SERVER_IMAGE:-}
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:3000"
    env_file: .env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-http://localhost:${STORAGE_PORT:-8333}/listing-public-v1}
      STORAGE_S3_ENDPOINT: http://seaweedfs:8333
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-listing-public-v1}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-seaweedfs-access-key}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-seaweedfs-secret-key}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE:-1}
      STORAGE_SIGNED_URL_TTL_SECONDS: ${STORAGE_SIGNED_URL_TTL_SECONDS:-900}
    depends_on:
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  assistant:
    <<: *loki-logging
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: assistant
    image: ${ASSISTANT_IMAGE:-}
    restart: unless-stopped
    ports:
      - "${ASSISTANT_PORT:-3001}:3001"
    env_file: .env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      SERVER_URL: http://server:3000
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  notifications:
    <<: *loki-logging
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: notifications
    image: ${NOTIFICATIONS_IMAGE:-}
    restart: unless-stopped
    ports:
      - "${NOTIFICATIONS_PORT:-3002}:3002"
    env_file: .env
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      SERVER_URL: http://server:3000       # internal Docker network — bypasses Traefik
      SMTP_HOST: smtp-server
      SMTP_PORT: "25"
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
      smtp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    <<: *loki-logging
    build:
      context: .
      dockerfile: Dockerfile.web
    image: ${WEB_IMAGE:-}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3003}:3000"
    env_file: .env
    environment:
      PORT: 3000
      ORIGIN: ${CORS_ORIGIN:-http://localhost:3003}
      # SSR fetches stay on the internal Docker network — never leave the host:
      INTERNAL_SERVER_URL: http://server:3000
      INTERNAL_ASSISTANT_URL: http://assistant:3001
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Mail (dev only — captures all outgoing emails, never relays) ─────────
  smtp-server:
    image: rnwood/smtp4dev:v3
    restart: unless-stopped
    ports:
      - "127.0.0.1:5025:80"    # web UI — view captured emails at http://localhost:5025
      # SMTP port 25 is NOT exposed to the host; apps connect via smtp-server:25
    environment:
      ServerOptions__Urls: "http://*:80"
      ServerOptions__TcpPort: "25"
      ServerOptions__HostName: smtp-server
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Observability ─────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.4.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3110}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      # Alerting
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      # Telegram contact point (set in .env)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      GRAFANA_ALERT_EMAIL: ${GRAFANA_ALERT_EMAIL:-ops@localhost}
      # SMTP (uses smtp4dev in dev; override in prod .env for real relay)
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${SMTP_HOST:-smtp-server}:${SMTP_PORT:-25}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM:-grafana@localhost}
      GF_SMTP_FROM_NAME: "Grafana Alerts"
      GF_SMTP_SKIP_VERIFY: "true"   # smtp4dev has no TLS; disable in prod if relay requires it
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy

volumes:
  pgdata:
  seaweedfs_data:
  loki_data:
  grafana_data:

# ── Observability access ──────────────────────────────────────────────────────
# Grafana: http://<vps-ip>:3110  (admin / ${GRAFANA_PASSWORD:-change-me})
# Loki is bound to 127.0.0.1 only — not exposed externally.
# Logs flow automatically from app containers via the loki Docker log driver.
