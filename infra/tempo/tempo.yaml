server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/wal/generator
    remote_write:
      - url: http://prometheus:9090/api/v1/write
  processor:
    service_graphs: {}
    span_metrics: {}
    # local_blocks removed: requires ingester trace WAL co-location
    # which is unreliable in Tempo's single-binary mode.
    # Its absence blocks ALL metrics_generator processing.

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
