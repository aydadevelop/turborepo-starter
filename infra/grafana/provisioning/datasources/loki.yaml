apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki          # referenced by alert-rules.yaml — must not change
    access: proxy
    url: http://loki:3100
    isDefault: true
    version: 1
    editable: false
    jsonData:
      derivedFields:
        # Extract trace ID from structured JSON logs (OTel format: "traceId":"<hex>")
        - name: TraceID
          matcherRegex: '"traceId":"([a-f0-9]+)"'
          url: '${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: View Trace
