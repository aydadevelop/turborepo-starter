apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    version: 1
    editable: false

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    version: 1
    editable: false
    jsonData:
      # Cross-signal: traces → logs
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        tags:
          - key: service.name
            value: compose_service
        filterByTraceID: true
        filterBySpanID: false
      # Cross-signal: traces → metrics (spanmetrics from Tempo generator)
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key: service.name
            value: job
        queries:
          - name: Request rate
            query: "sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))"
          - name: Error rate
            query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags,status_code="STATUS_CODE_ERROR"}[5m]))'
      # Service map (derived from spanmetrics)
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      # Search logs for a trace
      lokiSearch:
        datasourceUid: loki

  - name: Pyroscope
    type: grafana-pyroscope-datasource
    uid: pyroscope
    access: proxy
    url: http://pyroscope:4040
    isDefault: false
    version: 1
    editable: false
