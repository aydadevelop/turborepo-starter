apiVersion: 1

# Notification policies control routing: which contact point gets which alert.
# The root policy catches everything. More specific matchers take priority.

policies:
  - orgId: 1
    receiver: ops-telegram       # default: all alerts → Telegram
    group_by: [alertname, severity, compose_service]
    group_wait: 30s               # wait 30s before first notification (group more alerts)
    group_interval: 5m            # min time between notifications for same group
    repeat_interval: 4h           # re-notify if still firing after 4h

    routes:
      # Critical alerts also go to email
      - receiver: ops-email
        matchers:
          - severity = critical
        continue: true            # continue routing to parent (Telegram) as well
