apiVersion: 1

# Contact points define WHERE alerts are sent.
#
# Bot token is injected from env: GRAFANA_TELEGRAM_BOT_TOKEN (set in .env)
#
# GRAFANA LIMITATION: Grafana's alerting provisioning expands ${VAR} in YAML string
# values, then re-parses the result as a YAML scalar. Negative integers like -5037202969
# are inferred as YAML integer type, which fails Go's strict string field typing.
# !!str tags and quoted ${VAR} patterns are both ignored. Chat IDs MUST be hardcoded
# as YAML string literals. Update them here when group IDs change.
# Reference values also live in .env (GRAFANA_TELEGRAM_DEV_CHAT_ID / GRAFANA_TELEGRAM_PROD_CHAT_ID).

contactPoints:
  - orgId: 1
    name: ops-telegram
    receivers:
      - uid: telegram-dev
        type: telegram
        settings:
          bottoken: ${GRAFANA_TELEGRAM_BOT_TOKEN}
          chatid: "-5037202969"   # dev group: "grafana logs" — update in .env too
          message: |
            🚨 *{{ .CommonLabels.alertname }}*
            Status: {{ .Status | toUpper }}
            Severity: {{ .CommonLabels.severity }}
            {{ range .Alerts }}
            {{ .Annotations.summary }}
            {{ end }}
        disableResolveMessage: false

  - orgId: 1
    name: ops-telegram-prod
    receivers:
      - uid: telegram-prod
        type: telegram
        settings:
          bottoken: ${GRAFANA_TELEGRAM_BOT_TOKEN}
          chatid: "-4990956985"   # prod group: "grafana_errors_prod" — update in .env too
          message: |
            🚨 *{{ .CommonLabels.alertname }}*
            Status: {{ .Status | toUpper }}
            Severity: {{ .CommonLabels.severity }}
            {{ range .Alerts }}
            {{ .Annotations.summary }}
            {{ end }}
        disableResolveMessage: false

  - orgId: 1
    name: ops-email
    receivers:
      - uid: email-primary
        type: email
        settings:
          # Comma-separated list — override with GRAFANA_ALERT_EMAIL in .env
          addresses: ${GRAFANA_ALERT_EMAIL}
          subject: |
            [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
        disableResolveMessage: false
