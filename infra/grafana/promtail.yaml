server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use the compose service label as the "service" log label
      - source_labels:
          [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Also keep the raw container name
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # stdout vs stderr
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      # Drop Promtail's own logs to avoid a feedback loop
      - source_labels:
          [__meta_docker_container_label_com_docker_compose_service]
        regex: promtail
        action: drop
